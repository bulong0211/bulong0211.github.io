name: Deploy Hugo site to Branch

on:
  push:
    branches: ["main"] # 监听源码所在的 main 分支

permissions:
  contents: write  # 核心：必须开启写权限，才能把静态文件推送到分支

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 如果你有主题子模块

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to Branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # 使用内置 Token 即可
          publish_dir: ./public   # 将构建生成的目录推送到分支
          publish_branch: gh-pages # 推送的目标分支名，建议用 gh-pages
          commit_message: "Update site: ${{ github.event.head_commit.message }}"